name: CI Gate

on:
  pull_request:
    branches: [development, main]
    types: [opened, synchronize, reopened]

env:
  PLUGIN_NAME: ${{ github.event.repository.name }}

jobs:
  # ── Step 1: Contract lint ──
  contract-lint:
    name: Contract Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate openapi.yaml exists
        run: |
          if [ ! -f openapi.yaml ]; then
            echo "ERROR: openapi.yaml not found!"
            exit 1
          fi
          echo "openapi.yaml found ✓"

  # ── Step 2: Build smoke test ──
  build-smoke:
    name: Build & Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t plugin-smoke .
      - name: Smoke test /health
        run: |
          docker run -d --name plugin-test -e PORT=8080 -e PLUGIN_NAME=${{ env.PLUGIN_NAME }} -p 8080:8080 plugin-smoke
          sleep 3
          curl -sf http://localhost:8080/health | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', f'Bad status: {d}'; print('Health OK ✓')"
          docker logs plugin-test 2>&1 | tail -5
          docker stop plugin-test && docker rm plugin-test

  # ── Step 3: Unit tests ──
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx pytest-cov
      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=term-missing
